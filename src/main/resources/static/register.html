<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - College Tech Symposium 2026</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #1a1a2e;
            background: #f4f6fb;
        }
        nav {
            background: #16213e;
            padding: 1rem 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }
        nav .logo {
            color: #fff;
            font-size: 1.25rem;
            font-weight: 700;
            text-decoration: none;
        }
        nav ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
        }
        nav a {
            color: #e0e6f0;
            text-decoration: none;
            font-weight: 500;
        }
        nav a:hover, nav a.active { color: #4fc3f7; }
        .container { max-width: 560px; margin: 0 auto; padding: 2rem; }
        h1 { color: #0f3460; margin-bottom: 0.5rem; }
        .subtitle { color: #64748b; margin-bottom: 1.5rem; }
        form {
            background: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .field { margin-bottom: 1.25rem; }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.35rem;
            color: #0f3460;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.65rem 0.85rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #4fc3f7;
            box-shadow: 0 0 0 3px rgba(79,195,247,0.2);
        }
        button {
            width: 100%;
            background: #0f3460;
            color: #fff;
            border: none;
            padding: 0.85rem;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #16213e; }
        .success {
            display: none;
            background: #d1fae5;
            color: #065f46;
            padding: 1rem;
            border-radius: 6px;
            margin-top: 1rem;
            text-align: center;
        }
        footer {
            text-align: center;
            padding: 1.5rem;
            background: #16213e;
            color: #a0aec0;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Tech Symposium 2026</a>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="schedule.html">Schedule</a></li>
            <li><a href="speakers.html">Speakers</a></li>
            <li><a href="register.html" class="active">Register</a></li>
            <li><a href="announcements.html">Announcements</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Event Registration</h1>
        <p class="subtitle">Secure your spot at the College Tech Symposium 2026.</p>

        <form id="registerForm">
            <div class="field">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="Enter your full name">
            </div>
            <div class="field">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>
            <div class="field">
                <label for="roll">Roll Number / Employee ID</label>
                <input type="text" id="roll" name="roll" required placeholder="e.g. CS2024001">
            </div>
            <div class="field">
                <label for="category">Registration Category</label>
                <select id="category" name="category" required>
                    <option value="">Select category</option>
                    <option value="student">Student</option>
                    <option value="faculty">Faculty</option>
                    <option value="industry">Industry Professional</option>
                </select>
            </div>
            <div class="field">
                <label for="workshop">Preferred Workshop</label>
                <select id="workshop" name="workshop">
                    <option value="">None</option>
                    <option value="cloud">Cloud Computing</option>
                    <option value="devops">DevOps &amp; CI/CD</option>
                </select>
            </div>
            <button type="submit">Submit Registration</button>
        </form>

        <div class="success" id="successMsg">
            Registration submitted successfully! We will send a confirmation to your email.
        </div>
    </div>

    <footer>
        <p>&copy; 2026 College Tech Symposium. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function (e) {
            e.preventDefault();
            document.getElementById('successMsg').style.display = 'block';
            this.reset();
        });
    </script>
</body>
</html>
